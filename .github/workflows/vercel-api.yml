name: Deploy API - Vercel

on:
  push:
    branches: ["main", "master"]
    paths:
      - "api/**"
      - "src/data/portfolio-context.ts"
      - "vercel.json"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/vercel-api.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy-api:
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate required secrets
        run: |
          test -n "$VERCEL_TOKEN"
          test -n "$VERCEL_ORG_ID"
          test -n "$VERCEL_PROJECT_ID"
          test -n "$OPENAI_API_KEY"

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel project settings
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Deploy API to Vercel
        run: vercel deploy --prod --yes --token="$VERCEL_TOKEN" --env OPENAI_API_KEY="$OPENAI_API_KEY"
